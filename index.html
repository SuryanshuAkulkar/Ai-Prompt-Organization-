<!DOCTYPE html>
<html>
<head>
    <title>PromptVault AI</title>
</head>

<body>

    <header>
        <h1>PromptVault AI</h1>
        <p>Save, organize and reuse your AI prompts.</p>
    </header>

    <section>
        <input
            type="text"
            id="searchBox"
            placeholder="Search prompts..."
        >

        <select id="categoryFilter">
            <option>All Categories</option>
            <option>Coding</option>
            <option>Writing</option>
            <option>Design</option>
            <option>Marketing</option>
        </select>

        <button id="addBtn">+ Add Prompt</button>
    </section>

    <section id="promptContainer">
        <!-- Prompt cards will appear here -->
    </section>

</body>
</html>
